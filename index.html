<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Exam Question Model Generator</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f3f4f6;
      --shadow: 0 12px 30px rgba(17,24,39,.08);
      --radius:16px;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --accent:#2563eb;
      --ok:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
    }

    *{ box-sizing:border-box; }
    body{ margin:0; font-family:var(--sans); color:var(--text); background:var(--bg); }
    .wrap{ max-width:1200px; margin:0 auto; padding:22px 18px 44px; }

    header{
      display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap;
      margin-bottom:12px;
    }
    h1{ font-size:22px; margin:0; letter-spacing:.2px; }
    .question{
      margin-top:8px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      box-shadow: var(--shadow);
      font-size:13px;
      line-height:1.35;
      max-width:920px;
    }
    .question b{ font-weight:900; }
    .question .marks{ color:var(--muted); font-weight:800; margin-left:6px; white-space:nowrap; }
    .selectedQuestionTop{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }
    .selectedQuestionText{ color:var(--text); }

    .questionBrowser{
      margin:14px 0;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      box-shadow: var(--shadow);
      padding:14px;
    }
    .browserHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .browserHeader h2{
      margin:0;
      font-size:14px;
      letter-spacing:.2px;
    }
    .questionBrowser > h2{
      margin:0 0 10px;
      font-size:14px;
      letter-spacing:.2px;
    }
    .browserControls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .paperSelector{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:320px;
      flex:1 1 360px;
    }
    .paperSelector label{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .paperSelector select{
      width:100%;
      min-width:260px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--text);
      font:inherit;
      font-size:12px;
      padding:8px 10px;
    }
    @media (max-width:700px){
      .browserControls{ width:100%; justify-content:flex-start; }
      .paperSelector{ width:100%; min-width:0; align-items:flex-start; flex-direction:column; gap:4px; }
      .paperSelector select{ min-width:0; }
    }
    .manualImportPanel{
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      padding:12px 0;
      margin:8px 0 12px;
    }
    .manualImportPanel[hidden]{ display:none; }
    .manualImportForm{
      display:grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap:10px;
      align-items:start;
    }
    .manualImportField{
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    .manualImportField.full{ grid-column:1 / -1; }
    .manualImportField.wide{ grid-column: span 3; }
    .manualImportField.small{ grid-column: span 1; margin-top:0; }
    .manualImportField label{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }
    .manualImportField input,
    .manualImportField select,
    .manualImportField textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--text);
      font:inherit;
      font-size:13px;
      padding:9px 10px;
    }
    .manualImportField textarea{
      min-height:78px;
      resize:vertical;
      line-height:1.4;
    }
    .manualImportHelp{
      grid-column:1 / -1;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      padding:0;
    }
    .manualImportError{
      grid-column:1 / -1;
      color:#991b1b;
      background:#fef2f2;
      border:1px solid #fecaca;
      border-radius:10px;
      padding:9px 10px;
      font-size:12px;
      font-weight:800;
    }
    .manualImportError[hidden]{ display:none; }
    .manualImportActions{
      grid-column:1 / -1;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .manualOptional{
      grid-column:1 / -1;
      border:1px solid var(--line);
      border-radius:10px;
      padding:9px 10px;
      background:#fff;
    }
    .manualOptional summary{
      cursor:pointer;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }
    .manualOptionalGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:10px;
      margin-top:10px;
    }
    .manualOptionalGrid .manualImportField.wide{ grid-column:auto; }
    .manualOptionalGrid .manualImportField.full{ grid-column:1 / -1; }
    .questionMeta{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }
    @media (max-width:900px){
      .manualImportField.wide{ grid-column:1 / -1; }
      .manualImportField.small{ grid-column: span 2; }
    }
    @media (max-width:700px){
      .manualImportForm{ grid-template-columns:1fr; }
      .manualImportField.small{ grid-column:1 / -1; }
      .manualOptionalGrid{ grid-template-columns:1fr; }
      .manualImportActions{ justify-content:flex-start; }
    }
    .triageSummary{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:8px 0 12px;
    }
    .questionList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .questionItem{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px 12px;
      cursor:pointer;
      min-height:0;
      display:grid;
      grid-template-columns:auto auto auto minmax(0, 1fr);
      align-items:center;
      gap:10px;
      transition:.15s ease;
    }
    .questionItem:hover{ border-color:#c7cbe3; transform: translateY(-1px); }
    .questionItem:active{ transform: translateY(0); }
    .questionItem.selected{ border-color:rgba(37,99,235,.65); box-shadow:0 0 0 3px rgba(37,99,235,.10); }
    .questionItem.review{ background:#fffbeb; border-color:rgba(245,158,11,.28); }
    .questionItem.ignored{
      background:#f9fafb;
      color:#6b7280;
    }
    .questionNumber{ font-weight:900; font-size:13px; }
    .questionMarks{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .questionPreview{
      min-width:0;
      font-size:12px;
      line-height:1.35;
      color:var(--text);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .questionItem.ignored .questionPreview{ color:var(--muted); }
    @media (max-width:700px){
      .questionItem{
        grid-template-columns:auto auto;
        align-items:start;
      }
      .questionItem .statusBadge{ justify-self:start; }
      .questionPreview{
        grid-column:1 / -1;
        white-space:normal;
      }
    }
    .statusBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 8px;
      font-size:11px;
      font-weight:900;
      letter-spacing:0;
      white-space:nowrap;
      background:#fff;
    }
    .statusBadge.usable{ color:var(--ok); border-color:rgba(22,163,74,.28); background:rgba(22,163,74,.06); }
    .statusBadge.review{ color:#b45309; border-color:rgba(245,158,11,.35); background:rgba(245,158,11,.08); }
    .statusBadge.ignored{ color:#6b7280; border-color:#d1d5db; background:#f3f4f6; }
    .statusReason{ color:var(--muted); font-size:11px; line-height:1.35; margin-top:auto; }
    .unsupportedBox{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      min-height:190px;
    }
    .unsupportedBox h3{ margin:0 0 8px; font-size:15px; }
    .unsupportedBox p{ margin:8px 0 0; color:var(--muted); font-size:13px; line-height:1.45; }
    .unsupportedMeta{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin:8px 0 0;
    }
    .unsupportedBox details{
      border-top:1px solid var(--line);
      margin-top:12px;
      padding-top:10px;
    }
    .unsupportedBox summary{
      cursor:pointer;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
    }
    .unsupportedDetailList{
      margin:8px 0 0;
      padding-left:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(6, minmax(170px, 1fr));
      gap:12px;
      margin-top:10px;
    }
    @media (max-width:1100px){ .grid{ grid-template-columns: repeat(3, minmax(180px, 1fr)); } }
    @media (max-width:700px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px 12px;
      background:#fff;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:230px;
      position:relative;
      overflow:hidden;
      cursor:pointer;
      transition: .15s ease;
    }
    .card:hover{ transform: translateY(-1px); border-color:#d7dbf5; }
    .card:active{ transform: translateY(0px); }
    .card.selected{ outline: 3px solid rgba(37,99,235,.14); border-color: rgba(37,99,235,.55); }
    .cardHeaderRow{
      display:flex; align-items:flex-start; gap:10px;
    }
    .badge{
      width:22px; height:22px; border-radius:7px;
      background: var(--crit);
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:900; flex:0 0 auto; margin-top:1px;
    }
    .critTitle{ font-size:13px; font-weight:900; line-height:1.25; }

    .descWrap{
      display:grid;
      grid-template-columns: 1fr 44px;
      gap:10px;
      align-items:stretch;
      margin-top:auto;
    }
    .descBox{
      border:1px dashed var(--line);
      border-radius:14px;
      padding:10px 10px;
      background:#fff;
      min-height:118px;
    }
    .descLabel{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:6px;
    }
    .descLabel .bandName{ font-weight:900; font-size:12px; }
    .descLabel .bandRange{ color:var(--muted); font-size:12px; font-weight:800; }
    .descText{ font-size:12px; line-height:1.35; color:var(--muted); }

    .arrowCol{
      display:flex; flex-direction:column; justify-content:space-between; align-items:stretch; gap:10px;
    }
    .triBtn{
      height:44px; width:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:.15s ease;
      flex:0 0 auto;
    }
    .triBtn:hover{ border-color:#c7cbe3; transform: translateY(-1px); }
    .triBtn:active{ transform: translateY(0px); }
    .triBtn:focus{ outline:none; box-shadow: 0 0 0 3px rgba(37,99,235,.12); border-color: var(--accent); }
    .triBtn[disabled]{ opacity:.45; cursor:not-allowed; transform:none; }

    .tri{ width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; }
    .tri.up{ border-bottom:14px solid var(--crit); }
    .tri.down{ border-top:14px solid var(--crit); }

    /* Card footer mini status (assess mode) */
    .miniRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:2px;
    }
    .miniPill{
      display:inline-flex; align-items:center; gap:8px;
      padding:5px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:900;
      color: var(--muted);
      white-space:nowrap;
    }
    .miniDot{ width:8px; height:8px; border-radius:999px; display:inline-block; background: var(--muted); }
    .miniDot.ok{ background: var(--ok); }
    .miniDot.warn{ background: var(--warn); }
    .miniDot.bad{ background: var(--bad); }

    .miniBtn{
      border:1px solid var(--line);
      background:#fff;
      padding:6px 9px;
      border-radius:12px;
      cursor:pointer;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .miniBtn:hover{ border-color:#c7cbe3; }
    .miniBtn:active{ transform: translateY(1px); }

    /* Output section */
    .output{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background: var(--soft);
      padding:18px;
      box-shadow: var(--shadow);
    }
    .outputTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .outputTop h2{ margin:0; font-size:14px; letter-spacing:.2px; }

    .rightControls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .pill .mut{ color:var(--muted); font-weight:800; }

    .modeToggle{
      display:inline-flex;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      overflow:hidden;
      box-shadow: 0 6px 18px rgba(17,24,39,.06);
    }
    .modeBtn{
      border:0;
      background:transparent;
      padding:8px 10px;
      font-weight:900;
      font-size:12px;
      cursor:pointer;
    }
    .modeBtn.active{
      background: var(--accent);
      color:#fff;
    }

    .segToggle{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      user-select:none;
      font-size:12px;
      font-weight:900;
    }
    .segToggle input{ transform: translateY(1px); }
    .segToggle .mut{ color:var(--muted); font-weight:800; }

    .answerBox{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 14px;
      line-height:1.6;
      font-size:14px;
      min-height:190px;
    }

    /* Assess layout */
    .assessLayout{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:12px;
      align-items:start;
    }
    @media (max-width:900px){
      .assessLayout{ grid-template-columns: 1fr; }
    }

    textarea.studentInput{
      width:100%;
      min-height:190px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 14px;
      font-family:var(--sans);
      font-size:14px;
      line-height:1.6;
      resize:vertical;
      background:#fff;
      outline:none;
    }
    textarea.studentInput:focus{ box-shadow: 0 0 0 3px rgba(37,99,235,.12); border-color: var(--accent); }

    .panel{
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:12px;
      box-shadow: 0 8px 22px rgba(17,24,39,.06);
    }
    .panel h3{
      margin:0 0 8px;
      font-size:13px;
      letter-spacing:.2px;
    }
    .panel .muted{ color:var(--muted); font-size:12px; line-height:1.4; }
    .panelRow{
      display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
      margin-bottom:10px;
    }

    .panelTabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:10px 0 0;
    }
    .tabBtn{
      border:1px solid var(--line);
      background:#fff;
      padding:7px 10px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      font-size:12px;
    }
    .tabBtn.active{
      border-color: rgba(37,99,235,.55);
      box-shadow: 0 0 0 3px rgba(37,99,235,.10);
    }

    .sectionTitle{
      margin-top:12px;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      letter-spacing:.2px;
      text-transform:uppercase;
    }

    .quoteList{
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .quoteBtn{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background: var(--soft);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      font-size:12px;
      line-height:1.35;
    }
    .quoteBtn:hover{ border-color:#c7cbe3; }
    .quoteBtn:active{ transform: translateY(1px); }

    .improveList{
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      color:var(--text);
      font-size:12px;
      line-height:1.35;
    }
    .improveItem{
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      background:#fff;
    }
    .insertBtn{
      margin-top:8px;
      border:1px solid var(--line);
      background:#fff;
      padding:7px 10px;
      border-radius:12px;
      cursor:pointer;
      font-weight:900;
      font-size:12px;
    }

    /* Evidence highlight view */
    .markedView{
      margin-top:10px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
      font-size:13px;
      line-height:1.6;
      white-space:pre-wrap;
      overflow:auto;
      max-height:280px;
    }
    .evi{
      display:inline;
      padding:2px 5px;
      border-radius:9px;
      border:1px solid color-mix(in srgb, var(--c) 35%, #ffffff);
      background: color-mix(in srgb, var(--c) 14%, #ffffff);
      cursor:pointer;
    }
    .evi:hover{ outline: 2px solid color-mix(in srgb, var(--c) 35%, #ffffff); }
    .evi.focused{
      outline: 3px solid rgba(37,99,235,.22);
    }

    /* Colour-highlight segments (model answer) */
    .seg{
      display:inline;
      padding:2px 6px;
      border-radius:9px;
      border:1px solid color-mix(in srgb, var(--c) 35%, #ffffff);
      background: color-mix(in srgb, var(--c) 12%, #ffffff);
    }
    .noHighlights .seg{ padding:0; border:none; background:transparent; border-radius:0; }

    .toolbar{
      display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;
      align-items:center;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:9px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:900;
      font-size:13px;
    }
    .btn.primary{ background: var(--accent); border-color: var(--accent); color:#fff; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; }

    .status{
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .dot{ width:8px; height:8px; border-radius:999px; background: var(--muted); display:inline-block; }
    .dot.ok{ background: var(--ok); }
    .dot.warn{ background: var(--warn); }
    .dot.bad{ background: var(--bad); }

    .small{ color:var(--muted); font-size:12px; margin-top:10px; }

    .confPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:900;
      color: var(--muted);
      align-self:flex-start;
    }
    .confDot{ width:8px; height:8px; border-radius:999px; display:inline-block; }
    .confDot.high{ background: var(--ok); }
    .confDot.med{ background: var(--warn); }
    .confDot.low{ background: var(--bad); }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div style="min-width:320px">
        <h1 id="appTitle">Exam Question Model Generator</h1>
        <div id="questionHeader" class="question">
          Select a paper and question.
        </div>
      </div>
    </header>

    <section id="questionBrowser" class="questionBrowser" aria-label="Question browser">
      <div class="browserHeader">
        <div class="paperSelector">
          <label for="paperSelect">Paper</label>
          <select id="paperSelect" aria-label="Choose paper"></select>
        </div>
        <div class="browserControls">
          <button class="btn" id="btnToggleImport" type="button" aria-expanded="false" aria-controls="manualImportPanel">Add draft question</button>
        </div>
      </div>
      <h2 id="paperTitle">Demo paper</h2>
      <div class="small" id="paperSubtitle" hidden></div>
      <div id="manualImportPanel" class="manualImportPanel" hidden>

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function uniqueStrings(items){
      const seen = new Set();
      return (items || [])
        .map(item => String(item ?? "").trim())
        .filter(Boolean)
        .filter(item => {
          const key = item.toLowerCase();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
    }

    function parseCommandWords(text){
      return uniqueStrings(String(text || "")
        .split(/[,;\n]+/)

    function slugifyIdPart(value){

    }

    function makeManualId(kind, paperId, questionNumber){
      let id = "";
      do {
        manualImportCounter += 1;
        id = `manual-${kind}-${slugifyIdPart(paperId)}-q${slugifyIdPart(questionNumber)}-${Date.now().toString(36)}-${manualImportCounter}`;
      } while (PAPER_LIBRARY.some(paper => {
        const questionMatch = (paper.questions || []).some(q => q.id === id);
        const markSchemeMatch = (paper.markSchemeLinks || []).some(link => link.id === id);
        return questionMatch || markSchemeMatch;
      }));
      return id;
    }

    const DETECTION_PATTERNS = {
      writtenResponseSignals: [
        ["analyse", /\banaly[sz]e\b/i],
        ["evaluate", /\bevaluate\b/i],
        ["explain", /\bexplain\b/i],
        ["describe", /\bdescribe\b/i],
        ["justify", /\bjustify\b/i],
        ["compare", /\bcompare\b/i],
        ["discuss", /\bdiscuss\b/i],
        ["assess", /\bassess\b/i]
      ],
      visualSignals: [
        ["figure", /\bfigure\b/i],
        ["diagram", /\bdiagram\b/i],
        ["graph", /\bgraph\b/i],
        ["table", /\btable\b/i],
        ["image", /\bimage\b/i],
        ["data", /\bdata\b/i],
        ["shown", /\bshown\b/i],
        ["above", /\babove\b/i]
      ],
      drawingSignals: [
        ["draw", /\bdraw(?:ing)?\b/i],
        ["sketch", /\bsketch(?:ing)?\b/i],
        ["label", /\blabel(?:led|ling|ed|ing)?\b/i]
      ],
      calculationSignals: [
        ["calculate", /\bcalculate\b/i],
        ["work out", /\bwork\s+out\b/i],
        ["determine", /\bdetermine\b/i]
      ]
    };

    function detectSignals(text, patternList){
      return patternList
        .filter(([, pattern]) => pattern.test(text))
        .map(([label]) => label);
    }

    function extractDetectedFeatures(stem, commandWords = []){
      const combined = `${commandWords.join(" ")} ${stem || ""}`;
      const visualSignals = detectSignals(combined, DETECTION_PATTERNS.visualSignals);
      return {
        writtenResponseSignals: detectSignals(combined, DETECTION_PATTERNS.writtenResponseSignals),
        visualDependencySignals: visualSignals.filter(signal => ["figure", "diagram", "image", "shown", "above"].includes(signal)),
        calculationSignals: detectSignals(combined, DETECTION_PATTERNS.calculationSignals),
        drawingSignals: detectSignals(combined, DETECTION_PATTERNS.drawingSignals),
        tableOrFigureSignals: visualSignals.filter(signal => ["figure", "graph", "table", "data"].includes(signal))
      };
    }

    function getFeatureEvidence(marks, detectedFeatures){
      return uniqueStrings([
        pluralMarks(marks),
        ...(detectedFeatures.writtenResponseSignals || []),
        ...(detectedFeatures.visualDependencySignals || []),
        ...(detectedFeatures.tableOrFigureSignals || []),
        ...(detectedFeatures.drawingSignals || []),
        ...(detectedFeatures.calculationSignals || [])
      ]);
    }

    function isPrimaryDrawingTask(stem, commandWords, detectedFeatures){
      const firstCommand = String(commandWords?.[0] || "").toLowerCase();
      const startsWithDrawing = /^\s*(draw|sketch|label)\b/i.test(stem || "");
      const hasDrawOrSketch = (detectedFeatures.drawingSignals || []).some(signal => signal === "draw" || signal === "sketch");
      const hasLabelWithoutWriting = (detectedFeatures.drawingSignals || []).includes("label")
        && !(detectedFeatures.writtenResponseSignals || []).length;
      return startsWithDrawing || ["draw", "sketch", "label"].includes(firstCommand) || hasDrawOrSketch || hasLabelWithoutWriting;
    }

    function isPrimaryCalculationTask(stem, commandWords, detectedFeatures){
      const firstCommand = String(commandWords?.[0] || "").toLowerCase();
      const startsWithCalculation = /^\s*(calculate|work\s+out|determine)\b/i.test(stem || "");
      const hasCalculation = !!(detectedFeatures.calculationSignals || []).length;
      const hasWritten = !!(detectedFeatures.writtenResponseSignals || []).length;
      return startsWithCalculation || ["calculate", "work out", "determine"].includes(firstCommand) || (hasCalculation && !hasWritten);
    }

    function triageManualImport({ marks, stem, commandWords, detectedFeatures }){
      const statusEvidence = getFeatureEvidence(marks, detectedFeatures);
      const hasWritten = !!(detectedFeatures.writtenResponseSignals || []).length;
      const hasVisualDependency = !![
        ...(detectedFeatures.visualDependencySignals || []),
        ...(detectedFeatures.tableOrFigureSignals || [])
      ].length;

      if (marks <= 3){
        return {
          status: "ignored",
          statusReason: `Only ${pluralMarks(marks)}, so this is treated as short-answer and not suitable for model generation.`,
          statusEvidence
        };
      }

      if (isPrimaryDrawingTask(stem, commandWords, detectedFeatures)){
        return {
          status: "ignored",
          statusReason: "Requires drawing, sketching or labelling, so it is not suitable for text-only model generation.",
          statusEvidence
        };
      }

      if (isPrimaryCalculationTask(stem, commandWords, detectedFeatures)){
        return {
          status: "ignored",
          statusReason: "Calculation task rather than extended written response.",
          statusEvidence
        };
      }

      if (hasWritten && hasVisualDependency){
        return {
          status: "review",
          statusReason: "Written-response question depends on figure, table, graph, diagram or shown data that has not been extracted.",
          statusEvidence
        };
      }

      if (hasWritten){
        return {
          status: "review",
          statusReason: "Written-response question, but Phase 3 manual imports do not generate model support yet.",
          statusEvidence
        };
      }

      return {
        status: "review",
        statusReason: `Worth ${pluralMarks(marks)}, but the response type is ambiguous and needs review before model support is authored.`,
        statusEvidence
      };
    }

    function buildManualDraftQuestion(data){
      const createdAt = new Date().toISOString();
      const enteredCommandWords = parseCommandWords(data.commandWordsText);
      const detectedFeatures = extractDetectedFeatures(data.stem, enteredCommandWords);
      const commandWords = uniqueStrings([
        ...enteredCommandWords,
        ...detectedFeatures.writtenResponseSignals,
        ...detectedFeatures.drawingSignals,
        ...detectedFeatures.calculationSignals
      ]).map(word => word.toLowerCase());
      const triage = triageManualImport({
        marks: data.marks,
        stem: data.stem,
        commandWords,
        detectedFeatures
      });
      const questionId = makeManualId("q", data.paperId, data.number);
      const markSchemeLinkId = makeManualId("ms", data.paperId, data.number);
      const rawText = `Q${data.number} ${data.stem} (${pluralMarks(data.marks)})`;
      const hasMarkSchemeText = !!data.markSchemeText;

      return {
        question: {
          id: questionId,
          paperId: data.paperId,
          number: data.number,
          title: "Manual Draft",
          stem: data.stem,
          marks: data.marks,
          commandWords,
          source: {
            paperFileName: "manual-import",
            pageStart: null,
            pageEnd: null,
            rawText,
            notes: data.notes,
            createdAt
          },
          detectedFeatures,
          status: triage.status,

          teacherOverride: null,
          markSchemeLinkId,
          modelSupport: null,
          importMeta: {
            kind: "manual-import",
            createdAt
          }

        markSchemeLink: {

    }

    function estimateMarkOutOf9(){
      const criteria = getCriteria();
      const bandScore = getBandScore();
      const scores = criteria.map(c => bandScore[bandKeyFor(c.id)]).filter(n => Number.isFinite(n));
      const maxMarks = Number(appState.currentQuestion?.marks || 9);
      if (!scores.length) return { mark:"-", bandLabel:"-", maxMarks };

      const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
      const bandScores = Object.values(bandScore).filter(n => Number.isFinite(n));
      const minScore = Math.min(...bandScores);
      const maxScore = Math.max(...bandScores);
      let mark = 1 + ((avg - minScore) * ((maxMarks - 1) / Math.max(1, maxScore - minScore)));
      mark = Math.round(mark);
      mark = clamp(mark, 1, maxMarks);

      let bandLabel = "Developing";
      if (mark >= 7) bandLabel = "Advanced";
      else if (mark >= 4) bandLabel = "Secure";

      return { mark, bandLabel, maxMarks };
    }

    function updateScorePill(){

    /***********************
     * EVIDENCE HIGHLIGHTING
     ***********************/
    function buildEvidenceRanges(text, detailById){
      // returns: { ranges:[{start,end,critId,quoteIndex,quoteText}], foundById:{c1:n,...} }
      const t = String(text || "");
      const lower = t.toLowerCase();
      const ranges = [];
      const criteria = getCriteria();
      const foundById = Object.fromEntries(criteria.map(c => [c.id, 0]));

      for (const c of criteria){
        const ev = Array.isArray(detailById?.[c.id]?.evidence) ? detailById[c.id].evidence : [];
        ev.slice(0, 3).forEach((q, idx) => {
          const needle = String(q || "").trim();
          if (!needle) return;

          const nLower = needle.toLowerCase();
          const pos = lower.indexOf(nLower);
          if (pos === -1) return;

          ranges.push({ start: pos, end: pos + needle.length, critId: c.id, quoteIndex: idx, quoteText: needle });
          foundById[c.id] += 1;
        });
      }

      // sort by start then longer first (to reduce nested overlaps)
      ranges.sort((a,b) => (a.start - b.start) || ((b.end-b.start)-(a.end-a.start)));

      // merge/skip overlaps (keep first)
      const final = [];
      let lastEnd = -1;
      for (const r of ranges){
        if (r.start < lastEnd) continue;
        final.push(r);
        lastEnd = r.end;
      }

      return { ranges: final, foundById };
    }

    function buildMarkedHtml(text, detailById){
      evidenceSpans = {};
      const { ranges, foundById } = buildEvidenceRanges(text, detailById);

      // store foundCount into assessmentDetailById so cards can show missing evidence
      for (const c of getCriteria()){
        if (!assessmentDetailById[c.id]) assessmentDetailById[c.id] = { why:"", evidence:[], confidence: 0.6 };
        assessmentDetailById[c.id].foundCount = foundById[c.id] || 0;
      }

      const t = String(text || "");
      if (!highlightsOn || !ranges.length) return escapeHtml(t);

      let out = "";
      let cursor = 0;
      ranges.forEach(r => {
        out += escapeHtml(t.slice(cursor, r.start));
        const crit = getCrit(r.critId);
        const id = `evi_${r.critId}_${r.quoteIndex}_${r.start}`;
        evidenceSpans[`${r.critId}:${r.quoteIndex}`] = id;

        const snippet = t.slice(r.start, r.end);
        out += `<span id="${id}" class="evi" data-crit="${r.critId}" style="--c:${crit.color}" title="${escapeHtml(crit.title)}">${escapeHtml(snippet)}</span>`;
        cursor = r.end;
      });
      out += escapeHtml(t.slice(cursor));
      return out;
    }

    function focusEvidenceSpan(critId, quoteIndex){
      // remove previous
      document.querySelectorAll(".evi.focused").forEach(el => el.classList.remove("focused"));
      const key = `${critId}:${quoteIndex}`;
      const id = evidenceSpans[key];
      if (!id) return;

      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add("focused");
      el.scrollIntoView({ behavior:"smooth", block:"center" });
    }

          if (e.target && (e.target.closest("button") || e.target.closest("input") || e.target.closest("label"))) return;
          selectedCritId = c.id;
          renderCards();

        upBtn.disabled = (mode === "assess");
        upBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          state[c.id] = clamp(state[c.id] + 1, 0, bandKeys.length - 1);
          assessmentDetailById = {};
          renderCards(); renderMainBox(); updateScorePill();
        });

        const downBtn = document.createElement("button");
        downBtn.className = "triBtn";
        downBtn.type = "button";

        downBtn.disabled = (mode === "assess");

          state[c.id] = clamp(state[c.id] - 1, 0, bandKeys.length - 1);
          assessmentDetailById = {};
          renderCards(); renderMainBox(); updateScorePill();
        });

        arrowCol.appendChild(upBtn);
        arrowCol.appendChild(downBtn);

        descWrap.appendChild(descBox);
        descWrap.appendChild(arrowCol);

        card.appendChild(headerRow);
        card.appendChild(descWrap);

        // Assess-mode mini status (missing evidence / assessed state + improve button)
        if (mode === "assess"){
          const d = assessmentDetailById?.[c.id];
          const hasAssessed = !!d;
          const found = Number(d?.foundCount || 0);
          const hasEvidence = found > 0 || (Array.isArray(d?.evidence) && d.evidence.length > 0);

          let kind = "warn";
          let label = "Not assessed yet";
          if (hasAssessed){
            if (hasEvidence) { kind = "ok"; label = "Evidence found"; }
            else { kind = "bad"; label = "No evidence found"; }
          }

          const mini = document.createElement("div");
          mini.className = "miniRow";
          mini.innerHTML = `

            renderCards();
            renderMainBox({ forceTab:"improve" });
          });

          mini.appendChild(improveBtn);
          card.appendChild(mini);
        }

        gridEl.appendChild(card);
      });
    }

    /***********************
     * MODEL ANSWER BUILD
     ***********************/
    function buildModelHtml(){
      const seg = (c, text) => `<span class="seg" style="--c:${c.color}">${escapeHtml(text)}</span>`;
      const criteria = getCriteria();
      const byId = Object.fromEntries(criteria.map(c => [c.id, c]));
      const paragraphPlan = getSupport()?.paragraphPlan || [criteria.map(c => c.id)];

      return paragraphPlan.map(group => group.map(id => {
        const c = byId[id];
        if (!c) return "";
        return seg(c, c.model?.[bandKeyFor(c.id)] || "");
      }).filter(Boolean).join(" ")).filter(Boolean).join("<br><br>");
    }

    function buildModelText(){
      const criteria = getCriteria();
      const byId = Object.fromEntries(criteria.map(c => [c.id, c]));
      const paragraphPlan = getSupport()?.paragraphPlan || [criteria.map(c => c.id)];

      return paragraphPlan.map(group => group.map(id => {
        const c = byId[id];
        return c ? (c.model?.[bandKeyFor(c.id)] || "") : "";
      }).filter(Boolean).join(" ")).filter(Boolean).join("\n\n");
    }

    /***********************
     * APPLY AI RESULT
     ***********************/
    function applyBandsFromAI(aiBands){
      const byId = {};
      const bandKeys = getBandKeys();
      for (const c of getCriteria()) {
        const entry = aiBands?.[c.id];
        if (!entry) continue;

        const idx = bandKeys.indexOf(entry.band);
        if (idx >= 0) state[c.id] = idx;

        byId[c.id] = {
          why: entry.why || "",
          evidence: Array.isArray(entry.evidence) ? entry.evidence : [],
          confidence: typeof entry.confidence === "number" ? entry.confidence : Number(entry.confidence)
        };
      }
      assessmentDetailById = byId;
      lastAssessedText = (studentText || "");
      renderCards();
      updateScorePill();
    }

    /***********************
     * MOCK ASSESS
     ***********************/
    function mockAssessBands(text){
      const t = (text || "").toLowerCase();
      const has = (...words) => words.some(w => t.includes(w));
      const countHas = (arr) => arr.reduce((n, w) => n + (t.includes(w) ? 1 : 0), 0);

      let c1="Developing";
      if (has("open design") && (has("share")||has("shared")||has("openly"))) c1="Secure";
      if (c1==="Secure" && (has("cad")||has("licens")||has("ip")||has("copyright"))) c1="Advanced";

      let c2="Developing";
      if (has("traditional")||has("closed")||has("in-house")||has("company")||has("companies")) c2="Secure";
      if (c2==="Secure" && (has("whereas")||has("in contrast")||has("however")||has("compared"))) c2="Advanced";

      let c3="Developing";
      if (has("because")||has("therefore")||has("leads to")||has("results in")) c3="Secure";
      if (c3==="Secure" && (has("iteration")||has("feedback")||has("accelerat")||has("rapid")||has("consequence"))) c3="Advanced";

      let c4="Developing";
      const evalSignals = countHas(["however","on the other hand","although","but"]);
      if (evalSignals>=1 || (has("advantage")&&has("disadvantage"))) c4="Secure";
      if (c4==="Secure" && (has("weigh")||has("trade-off")||has("arguably")||has("overall"))) c4="Advanced";

      let c5="Developing";
      const breadthCount = countHas(["ip","copyright","profit","licens","manufactur","3d print","quality control","customis","repair","supply chain"]);
      if (breadthCount>=2) c5="Secure";
      if (breadthCount>=4) c5="Advanced";

      let c6="Developing";
      if (has("overall")||has("in conclusion")||has("to conclude")) c6="Secure";
      if (c6==="Secure" && (has("however")||has("although")||has("but"))) c6="Advanced";

      return { c1,c2,c3,c4,c5,c6 };
    }

    function buildLightEvidenceFromText(text){
      // simple “evidence” extractor for mock mode: pull up to 1 short snippet per criterion keyword match
      const src = String(text || "");
      const lower = src.toLowerCase();
      const pick = (phrase) => {
        const idx = lower.indexOf(phrase);
        if (idx === -1) return "";
        const start = Math.max(0, idx - 20);
        const end = Math.min(src.length, idx + phrase.length + 20);
        return src.slice(start, end).trim();
      };

      return {
        c1: [pick("open design")].filter(Boolean),
        c2: [pick("traditional"), pick("in contrast"), pick("whereas")].filter(Boolean).slice(0,2),
        c3: [pick("because"), pick("therefore"), pick("leads to")].filter(Boolean).slice(0,2),
        c4: [pick("however"), pick("although"), pick("on the other hand")].filter(Boolean).slice(0,2),
        c5: [pick("ip"), pick("profit"), pick("manufactur"), pick("3d")].filter(Boolean).slice(0,2),
        c6: [pick("overall"), pick("in conclusion")].filter(Boolean).slice(0,2),
      };
    }

    /***********************
     * REAL AI ASSESS
     ***********************/
    async function realAIAssess(text){
      const payload = {
        question: appState.currentQuestion?.stem || "",
        student_response: text,
        criteria: getCriteria().map(c => ({
          id: c.id,
          title: c.title,
          bands: Object.fromEntries(getBandKeys().map(band => [band, c.descriptors?.[band] || ""]))
        }))
      };

      const res = await fetch(ASSESS_API_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok){
        const msg = await res.text().catch(()=> "");
        throw new Error(`Assess API error (${res.status}): ${msg || "No details"}`);
      }

      const data = await res.json();
      if (!data || !data.bands) throw new Error("Assess API returned unexpected JSON");
      return data;
    }

    function buildSentenceStarter(critId, band){
      // Keep it student-safe: prompts/stems, not full answers.
      const base = getSentenceStarters();
      // Slightly stronger nudge if Developing
      if (band === "Developing"){
        return base[critId] || "Add a sentence that directly targets this criterion.";
      }
      if (band === "Secure"){
        return base[critId] || "Add one stronger sentence that pushes you toward Advanced.";
      }
      return base[critId] || "Keep it concise and precise.";
    }

        // keep feedback panel, just update marked view (fast)
        const mv = left.querySelector("#markedView");
        mv.innerHTML = buildMarkedHtml(studentText, assessmentDetailById);
      });

      if (opts.preserveScroll) ta.scrollTop = prevScroll;

      // Marked view
      const mv = left.querySelector("#markedView");
      mv.innerHTML = buildMarkedHtml(studentText, assessmentDetailById);
      mv.addEventListener("click", (e) => {
        const span = e.target.closest(".evi");
        if (!span) return;
        selectedCritId = span.dataset.crit;
        renderCards();
        renderMainBox({ forceTab:"evidence" });
      });

      // Feedback panel
      const panel = right.querySelector("#feedbackPanel");
      renderFeedbackPanel(panel, opts);

      updateScorePill();
      setStatus("warn", "Assess an answer to see feedback.");
    }

    function setMode(next){
      mode = next;
      // keep selection and studentText
      updateModeButtons();

      renderCards();
      renderMainBox();
    }

    /***********************
     * EVENTS
     ***********************/
    paperSelectEl.addEventListener("change", (e) => {
      selectPaper(e.target.value);
    });

    btnToggleImport.addEventListener("click", () => {
      manualImportVisible = !manualImportVisible;
      clearManualImportError();
      if (manualImportVisible){
        manualTargetPaperEl.value = appState.selectedPaperId;
      }
      renderQuestionBrowser();
      if (manualImportVisible) manualQuestionNumberEl.focus();
    });

    btnCancelImport.addEventListener("click", () => {
      manualImportVisible = false;
      manualImportFormEl.reset();
      clearManualImportError();
      renderQuestionBrowser();
    });

    manualImportFormEl.addEventListener("submit", handleManualImportSubmit);
    manualImportFormEl.addEventListener("input", clearManualImportError);
    manualImportFormEl.addEventListener("change", clearManualImportError);

    btnModeModel.addEventListener("click", () => setMode("model"));
    btnModeAssess.addEventListener("click", () => setMode("assess"));

    toggleEl.addEventListener("change", (e) => {
      highlightsOn = !!e.target.checked;
      toggleStateEl.textContent = highlightsOn ? "On" : "Off";
      renderMainBox({ preserveScroll:true });
    });

    toggleTeacherEl.addEventListener("change", (e) => {
      teacherView = !!e.target.checked;
      teacherStateEl.textContent = teacherView ? "On" : "Off";
      renderMainBox({ preserveScroll:true });
    });

    btnCopy.addEventListener("click", async () => {
      const text = (mode === "model") ? buildModelText() : (studentText || "");
      if (!text.trim()){
        setStatus("bad", "Nothing to copy yet.");
        return;
      }
      try{
        await navigator.clipboard.writeText(text);
        setStatus("ok", "Copied to clipboard.");
      }catch(e){
        setStatus("bad", "Copy blocked by browser.");
      }
    });

    btnReset.addEventListener("click", () => {
      const bandKeys = getBandKeys();
      const defaultBand = getSupport()?.defaultBand || bandKeys[0];
      const defaultIndex = Math.max(0, bandKeys.indexOf(defaultBand));
      getCriteria().forEach(c => state[c.id] = defaultIndex);
      assessmentDetailById = {};
      renderCards(); renderMainBox(); updateScorePill();
      setStatus("ok", "Reset to Secure.");
    });

    btnRandom.addEventListener("click", () => {
      const bandKeys = getBandKeys();
      getCriteria().forEach(c => state[c.id] = Math.floor(Math.random() * bandKeys.length));
      assessmentDetailById = {};
      renderCards(); renderMainBox(); updateScorePill();
      setStatus("ok", "Random mix applied.");
    });

    btnMockAssess.addEventListener("click", () => {
      const text = (studentText || "").trim();
      if (!text){
        setStatus("bad", "Paste an answer first.");
        return;
      }

      const bands = mockAssessBands(text);
      const bandKeys = getBandKeys();
      Object.entries(bands).forEach(([id, band]) => {
        const idx = bandKeys.indexOf(band);
        if (idx >= 0) state[id] = idx;
      });

      // lightweight evidence + placeholder why/conf
      const ev = buildLightEvidenceFromText(text);
      assessmentDetailById = {};
      getCriteria().forEach(c => {
        assessmentDetailById[c.id] = {
          why: teacherView ? "Mock assess uses a quick heuristic, not full examiner reasoning." : "",
          evidence: ev[c.id] || [],
          confidence: 0.62
        };
      });

      lastAssessedText = text;
      renderCards();
      renderMainBox({ preserveScroll:true, forceTab:"summary" });
      updateScorePill();
      setStatus("ok", "Mock assess applied.");
    });

    btnAssess.addEventListener("click", async () => {
      const text = (studentText || "").trim();
      if (!text){
        setStatus("bad", "Paste an answer first.");
        return;
      }

      const assessSnapshot = {
        token: ++latestAssessRequestToken,
        contextVersion: assessmentContextVersion,
        selectedPaperId: appState.selectedPaperId,
        selectedQuestionId: appState.selectedQuestionId,
        questionId: appState.currentQuestion?.id || "",
        studentText: text
      };

      btnAssess.disabled = true;
      btnMockAssess.disabled = true;
      btnReassess.disabled = true;
      setStatus("warn", "Assessing...");

      try{
        const data = await realAIAssess(text);
        if (!isAssessSnapshotCurrent(assessSnapshot)){
          setStatus("warn", "Assessment result ignored because the selected question or answer changed.");
          return;
        }
        applyBandsFromAI(data.bands);

        // ensure selected criterion exists in returned bands, else keep
        if (!assessmentDetailById[selectedCritId]) selectedCritId = getCriteria()[0]?.id || "";

        renderCards();
        renderMainBox({ preserveScroll:true, forceTab:"summary" });
        setStatus("ok", "AI assessment applied. Click criteria for focused feedback.");
      }catch(err){
        if (!isAssessSnapshotCurrent(assessSnapshot)){
          setStatus("warn", "Assessment result ignored because the selected question or answer changed.");
          return;
        }
        setStatus("bad", err && err.message ? err.message : String(err));
      }finally{
        if (assessSnapshot.token === latestAssessRequestToken){
          btnAssess.disabled = false;
          btnMockAssess.disabled = false;
          btnReassess.disabled = false;
        }
      }
    });

    btnReassess.addEventListener("click", async () => {
      const text = (studentText || "").trim();
      if (!text){
        setStatus("bad", "Paste an answer first.");
        return;
      }
      // If no prior assessment, behave like Assess
      if (!isAssessed()){
        btnAssess.click();
        return;
      }
      // If unchanged, still allow reassess (can improve evidence extraction)
      btnAssess.click();
    });

    /***********************
     * INIT
     ***********************/
    toggleStateEl.textContent = "On";
    teacherStateEl.textContent = "Off";
    selectPaper(appState.selectedPaperId);
  </script>
</body>
</html>
